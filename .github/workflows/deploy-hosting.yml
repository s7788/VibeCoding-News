name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FIREBASE_PROJECT_ID: coreaee-65e7f

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Write service account credentials
        shell: bash
        env:
          FIREBASE_HOSTING_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_HOSTING_SERVICE_ACCOUNT }}
        run: |
          test -n "$FIREBASE_HOSTING_SERVICE_ACCOUNT"
          printf '%s' "$FIREBASE_HOSTING_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Validate Firebase credentials
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          credentials_path = Path(os.environ["GOOGLE_APPLICATION_CREDENTIALS"])
          project_id = os.environ["FIREBASE_PROJECT_ID"]

          try:
              payload = json.loads(credentials_path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"::error::FIREBASE_HOSTING_SERVICE_ACCOUNT 不是有效的 JSON：{exc}")
              sys.exit(1)

          required_fields = ["type", "project_id", "client_email", "private_key"]
          missing = [field for field in required_fields if not payload.get(field)]
          if missing:
              print(f"::error::FIREBASE_HOSTING_SERVICE_ACCOUNT 缺少必要欄位：{', '.join(missing)}")
              sys.exit(1)

          if payload["type"] != "service_account":
              print(f"::error::憑證 type 必須是 service_account，實際為 {payload['type']!r}")
              sys.exit(1)

          print(f"Credential client_email: {payload['client_email']}")
          print(f"Credential project_id: {payload['project_id']}")
          print(f"Target Firebase project: {project_id}")

          if payload["project_id"] != project_id:
              print(
                  "::error::FIREBASE_HOSTING_SERVICE_ACCOUNT 的 project_id 與部署目標不一致。"
                  f" credentials={payload['project_id']} target={project_id}"
              )
              sys.exit(1)

          print("Firebase credentials 結構與 project_id 檢查通過。")
          PY

      - name: Verify Firebase project access
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          credentials_path = Path(os.environ["GOOGLE_APPLICATION_CREDENTIALS"])
          project_id = os.environ["FIREBASE_PROJECT_ID"]
          token_url = "https://oauth2.googleapis.com/token"
          project_url = f"https://firebase.googleapis.com/v1beta1/projects/{project_id}"

          try:
              payload = json.loads(credentials_path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"::error::無法讀取 service account JSON：{exc}")
              sys.exit(1)

          try:
              import jwt  # type: ignore
          except ImportError:
              print("Installing PyJWT for Firebase access verification...")
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "PyJWT", "cryptography"])
              import jwt  # type: ignore

          now = int(__import__("time").time())
          assertion = jwt.encode(
              {
                  "iss": payload["client_email"],
                  "scope": "https://www.googleapis.com/auth/cloud-platform https://www.googleapis.com/auth/firebase",
                  "aud": token_url,
                  "iat": now,
                  "exp": now + 3600,
              },
              payload["private_key"],
              algorithm="RS256",
          )

          token_request = urllib.request.Request(
              token_url,
              data=urllib.parse.urlencode(
                  {
                      "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
                      "assertion": assertion,
                  }
              ).encode(),
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )

          try:
              with urllib.request.urlopen(token_request, timeout=30) as response:
                  token_payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace")
              print(f"::error::無法用 service account 換取 access token：HTTP {exc.code} {detail}")
              sys.exit(1)

          access_token = token_payload.get("access_token")
          if not access_token:
              print("::error::Google OAuth 回應缺少 access_token。")
              sys.exit(1)

          project_request = urllib.request.Request(
              project_url,
              headers={"Authorization": f"Bearer {access_token}"},
          )

          try:
              with urllib.request.urlopen(project_request, timeout=30) as response:
                  project_payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace")
              print(
                  "::error::Service account 無法存取目標 Firebase project。"
                  f" client_email={payload['client_email']} project_id={project_id} "
                  f"HTTP {exc.code} {detail}"
              )
              sys.exit(1)

          print(
              "Firebase project access verified:"
              f" projectNumber={project_payload.get('projectNumber', 'unknown')}"
          )
          PY

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
